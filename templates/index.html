<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Mundial - Gestión</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Teoría del color aplicada al contexto deportivo */
            --bg: #f8fafc;
            --surface: #ffffff;
            --primary: #166534;
            --primary-light: #22c55e;
            --accent: #eab308;
            --accent-soft: #fef3c7;
            --text: #0f172a;
            --muted: #64748b;
            --border: #e2e8f0;
            --shadow:
                0 4px 12px rgba(15, 23, 42, .04);
            --shadow-hover:
                0 12px 30px rgba(22, 101, 52, .08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text);
            min-height: 100vh;
            padding: 40px 20px;
            background:
                radial-gradient(circle at top,
                    #dcfce7 0%,
                    #f8fafc 40%),
                #f8fafc;
        }

        .container {
            max-width: 900px;
            margin: auto;
        }

        .hero {
            background: rgba(255, 255, 255, .88);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, .8);
            border-radius: 28px;
            padding: 50px 35px;
            text-align: center;
            box-shadow:
                0 20px 50px rgba(15, 23, 42, .05);
            margin-bottom: 40px;
        }

        .badge {
            display: inline-block;
            background: #dcfce7;
            color: var(--primary);
            padding: 8px 18px;
            border-radius: 999px;
            font-size: .9rem;
            font-weight: 700;
            margin-bottom: 18px;
        }

        h1 {
            font-size: clamp(2.2rem, 5vw, 3.8rem);
            font-weight: 800;
            color: var(--text);
            letter-spacing: -0.03em;
            margin-bottom: 12px;
            animation: floatTitle 5s ease-in-out infinite;
        }

        .subtitle {
            color: var(--muted);
            margin-bottom: 28px;
            font-size: 1rem;
        }

        @keyframes floatTitle {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-4px);
            }
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: white;
            font-weight: 700;
            padding: 14px 28px;
            border-radius: 999px;
            background:
                linear-gradient(135deg,
                    var(--primary),
                    var(--primary-light));
            transition:
                transform .25s ease,
                box-shadow .25s ease;
            box-shadow:
                0 10px 25px rgba(22, 101, 52, .18);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow:
                0 15px 35px rgba(22, 101, 52, .25);
        }

        .section-title {
            font-size: 1.4rem;
            font-weight: 800;
            margin-bottom: 18px;
        }

        .list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card {
            position: relative;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 22px;
            box-shadow: var(--shadow);
            transition:
                transform .25s ease,
                box-shadow .25s ease,
                border-color .25s ease;
            opacity: 0;
            animation: cardEnter .5s ease forwards;
        }

        .card:nth-child(1) {
            animation-delay: .05s;
        }

        .card:nth-child(2) {
            animation-delay: .10s;
        }

        .card:nth-child(3) {
            animation-delay: .15s;
        }

        .card:nth-child(4) {
            animation-delay: .20s;
        }

        .card:nth-child(5) {
            animation-delay: .25s;
        }

        .card:nth-child(6) {
            animation-delay: .30s;
        }

        .card:nth-child(7) {
            animation-delay: .35s;
        }

        .card:nth-child(8) {
            animation-delay: .40s;
        }

        .card:nth-child(9) {
            animation-delay: .45s;
        }

        .card:nth-child(10) {
            animation-delay: .50s;
        }

        @keyframes cardEnter {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: #bbf7d0;
            box-shadow: var(--shadow-hover);
        }

        .card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            border-radius: 22px 22px 0 0;
            background:
                linear-gradient(90deg,
                    var(--primary),
                    var(--primary-light));
        }

        .card:nth-child(1)::before {
            background: #eab308;
        }

        .card:nth-child(2)::before {
            background: #94a3b8;
        }

        .card:nth-child(3)::before {
            background: #b45309;
        }

        .person-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }

        .person-name {
            font-size: 1.15rem;
            font-weight: 800;
        }

        .view-link {
            text-decoration: none;
            background: #f8fafc;
            color: #334155;
            padding: 8px 14px;
            border-radius: 999px;
            font-size: .9rem;
            font-weight: 700;
            transition: .2s ease;
        }

        .view-link:hover {
            background: #f1f5f9;
        }

        .stats {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;

            margin-top: 16px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            border-radius: 12px;
            border: 1px solid var(--border);
            font-size: .95rem;
        }

        .stat-item strong {
            color: var(--text);
        }

        .points {
            background: #dcfce7;
            border-color: #bbf7d0;
        }

        .beers {
            background: #fef3c7;
            border-color: #fde68a;
        }

        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #e2e8f0;
        }

        ::-webkit-scrollbar-thumb {
            background: #94a3b8;
            border-radius: 999px;
        }

        @media (max-width:700px) {
            body {
                padding: 20px 12px;
            }
            .hero {
                padding: 35px 22px;
            }
            .person-info {
                flex-direction: column;
                align-items: flex-start;
            }
            .view-link {
                width: 100%;
                text-align: center;
            }
            .stats {
                flex-direction: column;
            }
            .stat-item {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="hero">
            <div class="badge">
                ⚽ Mundial
            </div>
            <h1>🏆 Porras Mundial</h1>
            <div class="subtitle">
                Gestión de participantes, puntuaciones y cervezas
            </div>
            <a class="btn" href="/partidos">
                📅 Ver Panel de Partidos
            </a>
        </div>
        <div class="section-title">
            👥 Participantes
        </div>
        <div class="list">
            {% for p in personas %}
            <div class="card">
                <div class="person-info">
                    <span class="person-name">
                        {{ p.nombre }}
                    </span>
                    <a class="view-link" href="/persona/{{ p.id }}">
                        Ver perfil →
                    </a>
                </div>
                <div class="stats">
                    <span class="stat-item points">
                        🏆 Puntos:
                        <strong>{{ p.puntuacion }}</strong>
                    </span>
                    <span class="stat-item beers">
                        🍺 Cervezas:
                        <strong>{{ p.cervezas }}</strong>
                    </span>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
