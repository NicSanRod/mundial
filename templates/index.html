<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundial - Gestión</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-top: 30px;
            color: #333;
        }

        .card {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        a {
            text-decoration: none;
            color: #2d6cdf;
            font-weight: bold;
        }

        a:hover {
            color: #1b4fb5;
        }

        .btn {
            display: inline-block;
            background: #2d6cdf;
            color: white;
            padding: 10px 15px;
            border-radius: 6px;
            text-align: center;
            margin-bottom: 15px;
        }

        .btn:hover {
            background: #1b4fb5;
        }

        .list {
            margin-top: 20px;
        }

        .person {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .person span {
            font-size: 16px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>⚽ Porras Mundial</h1>

    <!-- BOTÓN PRINCIPAL -->
    <div style="text-align:center;">
        <a class="btn" href="/partidos">Ver Partidos</a>
    </div>

    <!-- LISTA PERSONAS -->
    <h1>Personas</h1>

    <div class="list">
        {% for p in personas %}
        <div class="card person">
            <span>{{ p.nombre }}</span>
            <a href="/persona/{{ p.id }}">Ver perfil</a>
        </div>
        {% endfor %}
    </div>

</div>

</body>
</html>
